<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Money App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body onclick="handleGlobalClick(event)">
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card glass">
            <button class="close-modal-btn" onclick="closeSaveModal()">✕</button>
            <div class="modal-total-label">СУММА ЗАТРАТ</div>
            <div id="modal-total-value" class="modal-total-amount">0</div>
            <div class="modal-actions">
                <button class="modal-confirm-btn" onclick="confirmSave()">ПОДТВЕРДИТЬ</button>
            </div>
        </div>
    </div>

    <header class="main-header">
        <span id="header-title">Главная</span>
        <button id="header-save" class="hidden" onclick="saveAndHome()">✓</button>
    </header>

    <main id="app-content">
        <section id="screen-home" class="screen active">
            <div id="cards-container" class="cards-grid"></div>
        </section>

        <section id="screen-counter" class="screen">
            <div id="items-list" class="scroll-container"></div>
            <div class="add-row-bar" onclick="createNewRow()">
                <span>+</span>
            </div>
            <div id="total-bar" class="total-container">
                <div class="total-label">ОБЩАЯ СУММА ЗАТРАТ</div>
                <div class="total-box"><span id="total-value">0</span></div>
            </div>
        </section>

        <section id="screen-converter" class="screen">
            <div class="converter-wrap">
                <input type="number" id="conv-input" value="100" onfocus="toggleUI(true)" onblur="toggleUI(false)">
                <div class="currency-row">
                    <div class="curr-select glass-border">
                        <div>🇷🇺</div><div>RUB</div>
                    </div>
                    <div class="swap-icon">⇄</div>
                    <div class="curr-select glass-border">
                        <div>🇺🇸</div><div>USD</div>
                    </div>
                </div>
                <div id="conv-result">0.00</div>
            </div>
        </section>

        <section id="screen-settings" class="screen">
            <div class="profile-section">
                <div id="user-avatar" class="avatar-big"></div>
                <h2 id="user-name">Пользователь</h2>
                <div class="settings-box glass">
                    <div class="s-row"><span>Версия</span><span>1.5.0</span></div>
                    <div class="s-row" onclick="clearAllData()"><span>Очистить всё</span><span>→</span></div>
                </div>
            </div>
        </section>
    </main>

    <nav id="bottom-nav" class="tab-bar">
        <div id="tab-indicator"></div>
        <div class="tab-item active" onclick="showScreen('screen-home', this, 0)">
            <img src="assets/home.png" alt="home">
        </div>
        <div class="tab-item" onclick="showScreen('screen-converter', this, 1)">
            <img src="assets/dollar.png" alt="conv">
        </div>
        <div class="tab-item" onclick="showScreen('screen-settings', this, 2)">
            <img src="assets/gear.png" alt="settings">
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
