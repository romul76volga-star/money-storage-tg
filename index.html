<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MoneyStorage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-content">
            <span id="screen-title">Конвертер</span>
            <div class="header-icon">✓</div>
        </div>
    </header>

    <main id="app-content">
        <div id="converter-screen" class="screen active">
            <div class="converter-page">
                
                <div class="converter-card">
                    <div class="converter-group">
                        <span class="conv-label">У меня есть</span>
                        <div class="conv-row">
                            <div class="currency-select-wrapper">
                                <select id="from-currency" class="currency-select">
                                    <option value="RUB">RUB</option>
                                    <option value="USD" selected>USD</option>
                                    <option value="EUR">EUR</option>
                                </select>
                                <span class="select-arrow"></span>
                            </div>
                            <input type="number" id="from-amount" class="conv-input" placeholder="0" value="100">
                        </div>
                    </div>

                    <div class="conv-divider">⇅</div>

                    <div class="converter-group">
                        <span class="conv-label">Я получу</span>
                        <div class="conv-row">
                            <div class="currency-select-wrapper">
                                <select id="to-currency" class="currency-select">
                                    <option value="RUB" selected>RUB</option>
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                </select>
                                <span class="select-arrow"></span>
                            </div>
                            <input type="number" id="to-amount" class="conv-input result-input" placeholder="0" readonly>
                        </div>
                    </div>
                </div>

                <div class="rate-info-card">
                    <div class="rate-text">1 USD = <span id="current-rate-display">92.45</span> RUB</div>
                    <div class="rate-update-time">Обновлено: только что</div>
                    <button class="update-rates-btn">Обновить курсы</button>
                </div>

            </div>
        </div>
    </main>

    <nav class="tab-bar">
        <div id="tab-indicator"></div>
        <div class="tab-item"><img src="home-icon.png" alt="home"></div>
        <div class="tab-item active"><img src="convert-icon.png" alt="convert"></div>
        <div class="tab-item"><img src="settings-icon.png" alt="settings"></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
