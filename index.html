<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoneyStorage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="main-header">
        <span id="header-title">Главная</span>
        <button id="header-save" class="hidden" onclick="saveAndHome()">✓</button>
    </div>

    <div id="app-content">
        <div id="screen-home" class="screen active">
            <div id="cards-container" class="cards-grid"></div>
        </div>

        <div id="screen-counter" class="screen">
            <div class="scroll-container">
                <div id="items-list"></div>
                <div class="add-row-bar" onclick="createNewRow()">
                    <span>+</span>
                </div>
            </div>
            
            <div id="total-bar" class="total-container">
                <div class="total-label">ОБЩАЯ СУММА ЗАТРАТ</div>
                <div id="total-value">0</div>
            </div>
        </div>

        <div id="screen-converter" class="screen">
            <div class="center-content">
                <div class="conv-row">
                    <span>USD</span>
                    <img src="assets/swap.png" class="swap-icon">
                    <span>RUB</span>
                </div>
                <input type="number" id="conv-input" placeholder="100">
            </div>
        </div>

        <div id="screen-settings" class="screen">
            <div class="center-content">
                <div class="user-avatar">👤</div>
                <div id="user-name" class="bold-label">Пользователь</div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal-content">
            <button class="close-modal" onclick="closeSaveModal()">✕</button>
            <div class="modal-header">СОХРАНИТЬ?</div>
            <div class="modal-body">
                Сумма: <span id="modal-total-value">0</span>
            </div>
            <button class="confirm-btn" onclick="confirmSave()">ПОДТВЕРДИТЬ</button>
        </div>
    </div>

    <div class="tab-bar" id="bottom-nav">
        <div id="tab-indicator"></div>
        <div class="tab-item active" onclick="showScreen('screen-home', this, 0)">
            <img src="assets/home.png">
        </div>
        <div class="tab-item" onclick="showScreen('screen-counter', this, 1)">
            <img src="assets/counter.png">
        </div>
        <div class="tab-item" onclick="showScreen('screen-settings', this, 2)">
            <img src="assets/settings.png">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
