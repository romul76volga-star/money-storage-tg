<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Money App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <section id="screen-home" class="screen active">
            <div id="empty-view" class="center-content">
                <button class="add-main-btn" onclick="showScreen('screen-counter')">
                    <img src="assets/plus.png" alt="+">
                </button>
                <p>Добавить новый расчет</p>
            </div>
            <div id="saved-data-view" class="hidden center-content">
                </div>
        </section>

        <section id="screen-counter" class="screen">
            <header class="glass-header">
                <span class="title">Счетчик</span>
                <button class="save-check-btn" onclick="saveAndHome()">✓</button>
            </header>
            <div id="items-list" class="scroll-container">
                </div>
            <div class="total-container glass">
                <div class="total-label">ОБЩАЯ СУММА ЗАТРАТ</div>
                <div class="total-box">
                    <span id="total-value">0</span>
                </div>
            </div>
        </section>

        <section id="screen-converter" class="screen">
            <header class="glass-header"><span class="title">Конвертер</span></header>
            <div class="converter-card glass">
                <input type="number" id="conv-input" value="100" oninput="convertCurrency()">
                <div class="currency-row">
                    <div class="select-box" onclick="openCurrencyPicker('from')">
                        <span id="from-flag">🇷🇺</span> <span id="from-code">RUB</span>
                    </div>
                    <img src="assets/swap.png" class="swap-icon">
                    <div class="select-box" onclick="openCurrencyPicker('to')">
                        <span id="to-flag">🇺🇸</span> <span id="to-code">USD</span>
                    </div>
                </div>
                <div id="conv-result">Загрузка курса...</div>
            </div>
            
            <div id="currency-picker" class="picker-overlay hidden" onclick="closeCurrencyPicker()">
                <div class="picker-content glass" onclick="event.stopPropagation()">
                    <div class="picker-item" onclick="selectCurrency('🇷🇺', 'RUB')">🇷🇺 RUB (Рубль)</div>
                    <div class="picker-item" onclick="selectCurrency('🇺🇸', 'USD')">🇺🇸 USD (Доллар)</div>
                    <div class="picker-item" onclick="selectCurrency('🇪🇺', 'EUR')">🇪🇺 EUR (Евро)</div>
                    <div class="picker-item" onclick="selectCurrency('🇰🇿', 'KZT')">🇰🇿 KZT (Тенге)</div>
                    <div class="picker-item" onclick="selectCurrency('🇹🇷', 'TRY')">🇹🇷 TRY (Лира)</div>
                </div>
            </div>
        </section>

        <section id="screen-settings" class="screen">
            <header class="glass-header"><span class="title">Настройки</span></header>
            <div class="profile-card glass">
                <div id="user-avatar" class="avatar-circle"></div>
                <div class="user-info">
                    <h2 id="user-name">Загрузка...</h2>
                    <p id="user-id">Standard Plan</p>
                </div>
            </div>
            <div class="settings-list glass">
                <div class="settings-item">Версия: 1.0.0</div>
                <div class="settings-item" onclick="localStorage.clear(); location.reload();">Сбросить всё</div>
            </div>
        </section>

        <nav class="tab-bar glass">
            <div class="tab-item active" onclick="showScreen('screen-home', this)">
                <img src="assets/home.png">
            </div>
            <div class="tab-item" onclick="showScreen('screen-converter', this)">
                <img src="assets/dollar.png">
            </div>
            <div class="tab-item" onclick="showScreen('screen-settings', this)">
                <img src="assets/gear.png">
            </div>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
