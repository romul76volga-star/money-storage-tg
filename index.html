<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MoneyStorage Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body onclick="handleGlobalClick(event)" class="theme-green">
    <header class="app-header">
        <div class="header-content">
            <span id="screen-title">Главная</span>
            <div id="header-action" class="header-check-btn hidden" onclick="saveAndHome()">
                <span>✓</span>
            </div>
        </div>
    </header>

    <main id="app-content">
        <section id="screen-home" class="screen active">
            <div id="cards-container" class="scrollable-content cards-grid"></div>
        </section>

        <section id="screen-counter" class="screen">
            <div id="items-list" class="scrollable-content"></div>
            <div id="counter-controls" class="bottom-controls">
                <div class="add-row-trigger" onclick="createNewRow()">
                    <div class="add-box-border"><span>+</span></div>
                </div>
                <div id="total-bar" class="total-plate">
                    <div class="total-label">ОБЩАЯ СУММА ЗАТРАТ</div>
                    <div class="total-sum" id="total-value">0</div>
                </div>
            </div>
        </section>

        <section id="screen-converter" class="screen">
            <div class="scrollable-content converter-page">
                <div class="converter-main-card">
                    <div class="conv-row">
                        <input type="number" id="from-amount" class="conv-input" value="100" oninput="convertCurrency()">
                        <div class="currency-select-wrapper">
                            <select id="from-currency" class="currency-select" onchange="convertCurrency()">
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="RUB" selected>RUB</option>
                                <option value="BYN">BYN</option>
                                <option value="KZT">KZT</option>
                            </select>
                        </div>
                    </div>

                    <div class="swap-container">
                        <div class="conv-divider" onclick="swapCurrencies()">⇅</div>
                    </div>

                    <div class="conv-row">
                        <input type="number" id="to-amount" class="conv-input result-input" readonly>
                        <div class="currency-select-wrapper">
                            <select id="to-currency" class="currency-select" onchange="convertCurrency()">
                                <option value="USD" selected>USD</option>
                                <option value="EUR">EUR</option>
                                <option value="RUB">RUB</option>
                                <option value="BYN">BYN</option>
                                <option value="KZT">KZT</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="glass-box rate-info-card">
                    <div class="rate-text"><span id="current-rate-display">загрузка...</span></div>
                    <div class="rate-update-time" id="rate-update-time"></div>
                    <button class="update-rates-btn" onclick="fetchRates()">Обновить курс</button>
                </div>
            </div>
        </section>

        <section id="screen-settings" class="screen">
            <div class="scrollable-content profile-page">
                <div class="profile-card">
                    <div class="avatar-container">
                        <img id="user-photo" src="https://via.placeholder.com/110" alt="Avatar">
                    </div>
                    <h2 id="user-name" class="profile-nickname">Загрузка...</h2>
                    <div class="info-grid">
                        <div class="info-box">
                            <span class="info-label">версия</span>
                            <span class="info-value">1.1.2</span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">статус</span>
                            <span id="user-status" class="info-value">Active</span>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <div class="theme-grid">
                        <div class="theme-item" onclick="setTheme('theme-black')">
                            <div class="theme-circle t-black"></div>
                            <span>Черный</span>
                        </div>
                        <div class="theme-item" onclick="setTheme('theme-white')">
                            <div class="theme-circle t-white"></div>
                            <span>Белый</span>
                        </div>
                        <div class="theme-item" onclick="setTheme('theme-green')">
                            <div class="theme-circle t-green"></div>
                            <span>Зеленый</span>
                        </div>
                    </div>
                </div>

                <div class="settings-actions">
                    <button class="action-btn" onclick="clearData()">Очистить данные</button>
                    <button class="action-btn" onclick="tg.close()">Выйти</button>
                </div>
            </div>
        </section>
    </main>

    <nav id="bottom-nav" class="tab-bar">
        <div id="tab-indicator"></div>
        <div class="tab-item active" onclick="showScreen('screen-home', this, 0)">
            <img src="assets/home.png" alt="home">
        </div>
        <div class="tab-item" onclick="showScreen('screen-converter', this, 1)">
            <img src="assets/dollar.png" alt="dollar">
        </div>
        <div class="tab-item" onclick="showScreen('screen-settings', this, 2)">
            <img src="assets/gear.png" alt="settings">
        </div>
    </nav>
    <script src="script.js"></script>
</body>
</html>
