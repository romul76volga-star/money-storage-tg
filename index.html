<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MoneyStorage</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body onclick="handleGlobalClick(event)">
    <header class="app-header">
        <div class="header-content">
            <span id="screen-title">Главная</span>
            <div id="header-action" class="header-check-btn hidden" onclick="saveAndHome()">
                <span>✓</span>
            </div>
        </div>
    </header>

    <main id="app-content">
        <section id="screen-home" class="screen active">
            <div id="cards-container" class="scroll-wrapper"></div>
        </section>

        <section id="screen-counter" class="screen">
            <div class="counter-layout">
                <div id="items-list" class="scroll-wrapper-rows"></div>
                
                <div class="add-row-trigger" onclick="createNewRow()">
                    <div class="add-box-border">
                        <span>+</span>
                    </div>
                </div>

                <div id="total-bar" class="total-plate">
                    <div class="total-text">ОБЩАЯ СУММА ЗАТРАТ</div>
                    <div class="total-sum"><span id="total-value">0</span></div>
                </div>
            </div>
        </section>

        <section id="screen-converter" class="screen">
            <div class="scroll-wrapper">
                <div class="placeholder-box">
                    <h3>Конвертер</h3>
                    <p>Раздел в разработке</p>
                </div>
            </div>
        </section>

        <section id="screen-settings" class="screen">
            <div class="scroll-wrapper">
                <div class="placeholder-box">
                    <h3>Профиль</h3>
                    <button class="danger-btn" onclick="clearData()">Очистить все данные</button>
                </div>
            </div>
        </section>
    </main>

    <nav id="bottom-nav" class="tab-bar">
        <div id="tab-indicator"></div>
        <div class="tab-item active" onclick="showScreen('screen-home', this, 0)">
            <img src="assets/home.png">
        </div>
        <div class="tab-item" onclick="showScreen('screen-converter', this, 1)">
            <img src="assets/dollar.png">
        </div>
        <div class="tab-item" onclick="showScreen('screen-settings', this, 2)">
            <img src="assets/gear.png">
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
